<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#1A1333"/>

  <!-- Body glow -->
  <circle cx="256" cy="280" r="170" fill="#2D1B6B"/>

  <!-- Horns -->
  <ellipse cx="190" cy="130" rx="22" ry="38" fill="#9B5DE5" transform="rotate(-15 190 130)"/>
  <ellipse cx="322" cy="130" rx="22" ry="38" fill="#9B5DE5" transform="rotate(15 322 130)"/>
  <ellipse cx="190" cy="118" rx="12" ry="22" fill="#C77DFF" transform="rotate(-15 190 130)"/>
  <ellipse cx="322" cy="118" rx="12" ry="22" fill="#C77DFF" transform="rotate(15 322 130)"/>

  <!-- Head -->
  <ellipse cx="256" cy="240" rx="148" ry="140" fill="#7B2FBE"/>

  <!-- Ears -->
  <ellipse cx="122" cy="220" rx="30" ry="40" fill="#9B5DE5"/>
  <ellipse cx="390" cy="220" rx="30" ry="40" fill="#9B5DE5"/>
  <ellipse cx="122" cy="220" rx="16" ry="24" fill="#E040FB"/>
  <ellipse cx="390" cy="220" rx="16" ry="24" fill="#E040FB"/>

  <!-- Eyes white -->
  <ellipse cx="208" cy="220" rx="38" ry="42" fill="white"/>
  <ellipse cx="304" cy="220" rx="38" ry="42" fill="white"/>

  <!-- Eye shine outer -->
  <ellipse cx="208" cy="224" rx="28" ry="30" fill="#7B2FBE"/>
  <ellipse cx="304" cy="224" rx="28" ry="30" fill="#7B2FBE"/>

  <!-- Pupils -->
  <ellipse cx="212" cy="226" rx="18" ry="20" fill="#1A0533"/>
  <ellipse cx="308" cy="226" rx="18" ry="20" fill="#1A0533"/>

  <!-- Eye sparkles -->
  <circle cx="218" cy="218" r="7" fill="white"/>
  <circle cx="314" cy="218" r="7" fill="white"/>
  <circle cx="206" cy="232" r="3" fill="white" opacity="0.7"/>
  <circle cx="302" cy="232" r="3" fill="white" opacity="0.7"/>

  <!-- Blush -->
  <ellipse cx="168" cy="268" rx="28" ry="16" fill="#FF6B9D" opacity="0.5"/>
  <ellipse cx="344" cy="268" rx="28" ry="16" fill="#FF6B9D" opacity="0.5"/>

  <!-- Nose -->
  <ellipse cx="256" cy="272" rx="14" ry="9" fill="#5C1A8E"/>

  <!-- Smile -->
  <path d="M 210 300 Q 256 338 302 300" stroke="#5C1A8E" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Teeth -->
  <rect x="240" y="300" width="16" height="18" rx="4" fill="white"/>
  <rect x="258" y="300" width="16" height="18" rx="4" fill="white"/>

  <!-- Stars around head -->
  <text x="80" y="160" font-size="32" fill="#FFD700" opacity="0.9">★</text>
  <text x="390" y="150" font-size="24" fill="#C77DFF" opacity="0.9">✦</text>
  <text x="100" y="330" font-size="20" fill="#E040FB" opacity="0.8">✦</text>
  <text x="385" y="320" font-size="28" fill="#FFD700" opacity="0.8">★</text>

  <!-- Bottom text badge -->
  <rect x="156" y="368" width="200" height="44" rx="22" fill="#FFD700"/>
  <text x="256" y="397" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#1A1333">VOCA MON</text>
</svg>
